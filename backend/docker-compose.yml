# Docker Compose configuration for backend + database
version: '3.8'

services:
  # MariaDB Database
  db:
    image: mariadb:10.11
    container_name: capstone-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-image_gallery_db}
      MYSQL_USER: ${MYSQL_USER:-capstone_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-capstone_password}
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "${DB_PORT:-3306}:3306"
    networks:
      - capstone-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      timeout: 20s
      retries: 10

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: capstone-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3069}
      DATABASE_URL: mysql://${MYSQL_USER:-capstone_user}:${MYSQL_PASSWORD:-capstone_password}@db:3306/${MYSQL_DATABASE:-image_gallery_db}
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      UPLOAD_PATH: /app/uploads
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-5000000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    volumes:
      - uploads:/app/uploads
    ports:
      - "${PORT:-3069}:3069"
    networks:
      - capstone-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3069/api-docs', (r) => {if(r.statusCode!==200)throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  capstone-network:
    driver: bridge

volumes:
  mariadb_data:
  uploads:
